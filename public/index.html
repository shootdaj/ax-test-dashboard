<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AX Dashboard — Real-Time Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='18' width='100' height='100' fill='%23111'/><text x='50' y='68' text-anchor='middle' font-size='52' font-weight='900' fill='url(%23g)'>AX</text><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%2300e5ff'/><stop offset='100%25' stop-color='%23ff00e5'/></linearGradient></defs></svg>">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header__brand">
      <div class="header__logo">AX</div>
      <span class="header__title">Dashboard</span>
    </div>
    <div class="header__controls">
      <div class="header__status">
        <span class="metric-card__status metric-card__status--ok"></span>
        <span id="connection-status">Connecting...</span>
      </div>
      <div class="time-range">
        <button class="time-range__btn time-range__btn--active" data-range="1h">1H</button>
        <button class="time-range__btn" data-range="6h">6H</button>
        <button class="time-range__btn" data-range="24h">24H</button>
        <button class="time-range__btn" data-range="7d">7D</button>
      </div>
      <select class="dashboard-select" id="dashboard-select">
        <option value="1">System Overview</option>
        <option value="2">Performance</option>
      </select>
    </div>
  </header>

  <!-- Alert Banner -->
  <div class="alert-banner" id="alert-banner">
    <span class="alert-banner__dot"></span>
    <span id="alert-banner-text">No active alerts</span>
  </div>

  <!-- Main Content -->
  <main class="main">
    <!-- Metric Cards -->
    <section class="metrics-grid" id="metrics-grid">
      <!-- Populated by JS -->
    </section>

    <!-- Gauges Row -->
    <section class="gauges-grid" id="gauges-grid">
      <!-- Populated by JS: gauge charts for CPU and Memory -->
    </section>

    <!-- Charts -->
    <section class="charts-grid" id="charts-grid">
      <!-- Populated by JS -->
    </section>

    <!-- Bottom Row: Heat Map + Alerts -->
    <section class="bottom-grid" id="bottom-grid">
      <div class="card chart-card" id="heatmap-card">
        <div class="chart-card__header">
          <div>
            <div class="chart-card__title">Request Distribution</div>
            <div class="chart-card__subtitle">Requests by hour (7-day view)</div>
          </div>
        </div>
        <div class="chart-card__canvas-wrap">
          <canvas id="chart-heatmap"></canvas>
        </div>
      </div>
      <div class="card alerts-panel" id="alerts-panel">
        <div class="chart-card__header">
          <div>
            <div class="chart-card__title">Alert Rules</div>
            <div class="chart-card__subtitle" id="alerts-count">0 active</div>
          </div>
        </div>
        <div class="alerts-list" id="alerts-list">
          <!-- Populated by JS -->
        </div>
      </div>
    </section>

    <!-- Footer -->
    <div class="last-updated" id="last-updated">Loading...</div>
  </main>

  <script src="/js/charts.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
